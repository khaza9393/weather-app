<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
<div class="container">
    
<div class="app-title"> Weather App</div>



<div class="search-container">
    <input type="text" class="search-input" placeholder="Enter city name" spellcheck="false">
   <button type="submit" class="search-btn"><i class="fa fa-search"></i></button>
   </div>
 <div class="weather">
   
<img src="cloudy.png" class="weather-icon" alt="Weather Icon">
<h1 class="temperature">25°C</h1>
<h2 class="city">india</h2>

<h3 class="description">Cloudy</h3>
<div class="details">
    <div class="col">
        <img src="humidity.png" alt="Humidity Icon">
        <div>
            <p class="humidity">80%</p>
            <p>Humidity</p>

        </div>
       
</div>
 <div class="col">
        <img src="wind-turbine.png" alt="Wind Icon">
        <div>
            <p class="wind">10 km/h</p>
            <p>Wind Speed</p>
        </div>
    </div>
 </div>
    
</div>


    
    <script src="script.js">
        
    </script>
</body>
</html>
